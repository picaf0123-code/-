name: AI_Chat_Factory
on:
  workflow_dispatch:
    inputs:
      chat_command:
        description: '영상의 내용을 입력하세요'
        required: true
        default: '안녕하세요 수리공님'

jobs:
  run-ai:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4  # 최신 버전으로 교체
      - name: Python Setup
        uses: actions/setup-python@v5 # 최신 버전으로 교체
        with:
          python-version: '3.10'
      - name: Install Tools
        run: |
          pip install edge-tts moviepy requests
      - name: Create Video
        run: |
          # 소통 두뇌에 당신의 명령을 전달합니다!
          python auto_promo_factory.py "${{ github.event.inputs.chat_command }}"
      - name: Upload Result
        uses: actions/upload-artifact@v4 # 🚨 여기서 v4로 바꿔야 에러가 안 납니다!
        with:
          name: ai-video-result
          path: ai_result.mp4
