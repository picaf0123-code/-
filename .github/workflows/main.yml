name: AI_Chat_Factory
on:
  workflow_dispatch:
    inputs:
      chat_command:
        description: '영상의 내용을 입력하세요'
        required: true
        default: '안녕하세요'

jobs:
  run-ai:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install Tools
        run: |
          pip install edge-tts moviepy requests
      - name: Create Video
        run: |
          python auto_promo_factory.py "${{ github.event.inputs.chat_command }}"
      - name: Upload Result
        uses: actions/upload-artifact@v3
        with:
          name: ai-video-result
          path: result.mp4
